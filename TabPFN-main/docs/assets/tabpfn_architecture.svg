  <text x="884" y="142" text-anchor="middle" font-size="14" fill="#101010">y<tspan font-size="8.5" dy="2.5">train</tspan></text>
  <text x="784" y="192" text-anchor="middle" font-size="14" fill="#101010">X<tspan font-size="8.5" dy="2.5">test</tspan></text>
  <text x="884" y="192" text-anchor="middle" font-size="15" fill="#101010">?</text>

  <!-- arrow to network -->
  <line x1="924" y1="137" x2="1010" y2="137" stroke="#101010" stroke-width="2" marker-end="url(#arr)"/>

  <!-- network box -->
  <rect x="1016" y="112" width="120" height="50" rx="4" fill="#ffffff" stroke="#101010" stroke-width="1.5"/>
  <use href="#priorLogo" x="1039" y="128" width="17" height="17"/>
  <text x="1060" y="141" text-anchor="start" font-size="12" font-weight="700" fill="#101010">TabPFN-3</text>

  <!-- arrow to prediction -->
  <line x1="1136" y1="137" x2="1172" y2="137" stroke="#101010" stroke-width="2" marker-end="url(#arr)"/>

  <!-- prediction histogram -->
  <text x="1202" y="94" text-anchor="middle" font-size="12" fill="#101010">Prediction</text>
  <g fill="#6b7280">
    <rect x="1180" y="133" width="6" height="11"/>
    <rect x="1186" y="124" width="6" height="20"/>
    <rect x="1192" y="114" width="6" height="30"/>
    <rect x="1198" y="126" width="6" height="18"/>
    <rect x="1204" y="136" width="6" height="8"/>
    <rect x="1210" y="120" width="6" height="24"/>
    <rect x="1216" y="112" width="6" height="32"/>
    <rect x="1222" y="128" width="6" height="16"/>
    <rect x="1228" y="138" width="6" height="6"/>
  </g>

  <!-- subtitle: the whole array (X_train, y_train, X_test) is one dataset -->
  <text x="824" y="230" text-anchor="middle" font-size="11.5" font-style="italic" fill="#3f2670">An arbitrary real-world dataset</text>
</svg>
