  <rect x="0" y="0" width="1280" height="300" fill="#ffffff"/>
  <text x="20" y="30" font-size="20" font-weight="700" fill="#101010">a</text>

  <!-- ================= LEFT PANEL ================= -->
  <rect x="36" y="44" width="600" height="234" rx="14" fill="#e8e8f2"/>
  <text x="336" y="18" text-anchor="middle" font-size="14" font-weight="600" fill="#101075">TabPFN is trained on synthetic data to take entire</text>
  <text x="336" y="36" text-anchor="middle" font-size="14" font-weight="600" fill="#101075">datasets as inputs and predict in a forward pass</text>

  <!-- data table -->
  <g stroke="#101010" stroke-width="1.5" fill="#ffffff">
    <rect x="72" y="84" width="120" height="50"/>
    <rect x="192" y="84" width="80" height="50"/>
    <rect x="72" y="134" width="120" height="50"/>
    <rect x="192" y="134" width="80" height="50"/>
  </g>
  <text x="132" y="114" text-anchor="middle" font-size="14" fill="#101010">X<tspan font-size="8.5" dy="2.5">train</tspan></text>
  <text x="232" y="114" text-anchor="middle" font-size="14" fill="#101010">y<tspan font-size="8.5" dy="2.5">train</tspan></text>
  <text x="132" y="164" text-anchor="middle" font-size="14" fill="#101010">X<tspan font-size="8.5" dy="2.5">test</tspan></text>
  <text x="232" y="164" text-anchor="middle" font-size="15" fill="#101010">?</text>

  <!-- arrow to network -->
  <line x1="272" y1="109" x2="352" y2="109" stroke="#101010" stroke-width="2" marker-end="url(#arr)"/>

  <!-- network box -->
  <rect x="358" y="80" width="158" height="58" rx="4" fill="#ffffff" stroke="#101010" stroke-width="1.5"/>
  <use href="#priorLogo" x="393" y="84" width="21" height="21"/>
  <text x="418" y="100" text-anchor="start" font-size="14" font-weight="700" fill="#101010">TabPFN-3</text>
  <text x="437" y="120" text-anchor="middle" font-size="10.5" fill="#374151">neural network</text>
  <text x="437" y="133" text-anchor="middle" font-size="10.5" fill="#374151">parameterized by θ</text>

  <!-- arrow to prediction -->
  <line x1="516" y1="109" x2="552" y2="109" stroke="#101010" stroke-width="2" marker-end="url(#arr)"/>

  <!-- prediction histogram -->
  <text x="582" y="66" text-anchor="middle" font-size="12" fill="#101010">Prediction</text>
  <g fill="#6b7280">
    <rect x="560" y="105" width="6" height="11"/>
    <rect x="566" y="96"  width="6" height="20"/>
    <rect x="572" y="86"  width="6" height="30"/>
    <rect x="578" y="98"  width="6" height="18"/>
    <rect x="584" y="108" width="6" height="8"/>
    <rect x="590" y="92"  width="6" height="24"/>
    <rect x="596" y="84"  width="6" height="32"/>
    <rect x="602" y="100" width="6" height="16"/>
    <rect x="608" y="110" width="6" height="6"/>
  </g>

  <!-- subtitle: the whole array (X_train, y_train, X_test) is one dataset -->
  <text x="172" y="202" text-anchor="middle" font-size="11.5" font-style="italic" fill="#3f2670">A synthetic dataset</text>

  <!-- loss box -->
  <rect x="340" y="206" width="200" height="58" rx="4" fill="#ffffff" stroke="#101010" stroke-width="1.5"/>
  <text x="440" y="228" text-anchor="middle" font-size="13" fill="#101010">−log q<tspan font-size="8.5" dy="2.5">θ</tspan><tspan dy="-2.5"> (y</tspan><tspan font-size="8.5" dy="2.5">test</tspan><tspan dy="-2.5"> |…)</tspan></text>
  <text x="440" y="245" text-anchor="middle" font-size="10.5" fill="#374151">Training loss to be optimized</text>
  <text x="440" y="258" text-anchor="middle" font-size="10.5" fill="#374151">across millions of datasets</text>

  <!-- prediction -> loss arrow -->
  <path d="M585 120 L 585 235 L 545 235" fill="none" stroke="#101010" stroke-width="2" marker-end="url(#arr)"/>

  <!-- y_test box -->
  <rect x="180" y="217" width="72" height="36" rx="4" fill="#ffffff" stroke="#101010" stroke-width="1.5"/>
  <text x="216" y="239" text-anchor="middle" font-size="14" fill="#101010">y<tspan font-size="8.5" dy="2.5">test</tspan></text>
  <line x1="252" y1="235" x2="335" y2="235" stroke="#101010" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ================= RIGHT PANEL ================= -->
  <rect x="688" y="44" width="556" height="234" rx="14" fill="#f1eaf0"/>
  <text x="966" y="18" text-anchor="middle" font-size="14" font-weight="600" fill="#101075">TabPFN can now be applied to arbitrary</text>
  <text x="966" y="36" text-anchor="middle" font-size="14" font-weight="600" fill="#101075">unseen real-world datasets</text>

  <!-- data table -->
  <g stroke="#101010" stroke-width="1.5" fill="#ffffff">
